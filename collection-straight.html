<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Straight Hair Collection | lacewigs.com</title>
    <style>
        :root {
            --primary-color: #0b0b0b;
            --accent-color: #d4af37; /* Premium gold accent for lacewigs.com */
            --text-color: #222222;
            --bg-color: #ffffff;
            --gray-light: #f9f9f9;
            --gray-border: #e8e8e8;
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Announcement Bar */
        .announcement-bar {
            background-color: var(--primary-color);
            color: #ffffff;
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            border-bottom: 1px solid var(--gray-border);
            position: sticky;
            top: 0;
            background: #ffffff;
            z-index: 1000;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: lowercase;
            letter-spacing: 1px;
            text-decoration: none;
            color: var(--primary-color);
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-actions a, .menu-toggle {
            color: var(--primary-color);
            font-size: 1.2rem;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
        }

        /* Mobile Drawer Menu */
        .mobile-drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: #ffffff;
            z-index: 2000;
            padding: 40px 30px;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            transition: left 0.4s cubic-bezier(0.1, 1, 0.1, 1);
        }

        .mobile-drawer.open {
            left: 0;
        }

        .drawer-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        .drawer-links {
            list-style: none;
            margin-top: 40px;
        }

        .drawer-links li {
            margin-bottom: 25px;
        }

        .drawer-links a {
            text-decoration: none;
            color: var(--primary-color);
            text-transform: uppercase;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 1500;
            display: none;
        }

        .drawer-overlay.active {
            display: block;
        }

        /* Image Carousel Hero Banner */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 450px;
            overflow: hidden;
            background-color: var(--gray-light);
        }

        .carousel-track {
            display: flex;
            width: 300%; /* Total slides multiplied by 100% */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .carousel-slide {
            width: 33.333%;
            height: 100%;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Placeholders - Replace URLs with your actual photoshoot banner images */
        .slide-1 { background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://unsplash.com'); }
        .slide-2 { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://unsplash.com'); }
        .slide-3 { background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://unsplash.com'); }

        .carousel-caption {
            text-align: center;
            color: #ffffff;
            z-index: 2;
        }

        .carousel-caption h1 {
            font-size: 3.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .carousel-caption p {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .carousel-btn:hover { background: #ffffff; }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }

        .carousel-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .dot.active { background: #ffffff; }

        /* Main E-commerce Shop Layout */
        .shop-container {
            display: flex;
            padding: 60px 5%;
            gap: 40px;
        }

        /* Left Filter Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            flex-shrink: 0;
        }

        .filter-group {
            margin-bottom: 35px;
            border-bottom: 1px solid var(--gray-border);
            padding-bottom: 25px;
        }

        .filter-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .filter-list {
            list-style: none;
        }

        .filter-list li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .filter-list input[type="checkbox"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Right Content Block */
        .main-content {
            flex-grow: 1;
        }

        .shop-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--gray-border);
        }

        .mobile-filter-trigger {
            display: none;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .product-card {
            border: 1px solid var(--gray-border);
            background: #ffffff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .product-image {
            width: 100%;
            height: 360px;
            background-color: #e9e9e9;
            background-size: cover;
            background-position: center;
        }

        .product-details {
            padding: 20px;
            text-align: center;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 8px;
            min-height: 48px;
        }

        .product-price {
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 15px;
