<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>613 Blonde Straight 13x4 Lace Front Wig | The Lace Wigs</title>
<style>
/* ==========================================================================
   1. CORE BRAND DESIGN SYSTEM
   ========================================================================== */
:root {
    --primary: #111111;
    --secondary: #555555;
    --accent: #d4af37;
    --light-bg: #fafafa;
    --border: #eeeeee;
    --white: #ffffff;
    --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    --success: #198754;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
}

body {
    background-color: var(--white);
    color: var(--primary);
    line-height: 1.6;
    overflow-x: hidden;
}

/* ==========================================================================
   2. STICKY HEADER NAVIGATION
   ========================================================================== */
header {
    background-color: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 25px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 999;
}

.logo h1 {
    font-size: 1.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: bold;
    cursor: pointer;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 35px;
    align-items: center;
}

nav ul li a {
    text-decoration: none;
    color: var(--secondary);
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: var(--transition);
}

.cart-link {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

#bag-count {
    background-color: var(--primary);
    color: var(--white);
    font-size: 0.75rem;
    padding: 2px 7px;
    border-radius: 50%;
    font-weight: bold;
}

/* ==========================================================================
   3. PRODUCT DETAIL LAYOUT
   ========================================================================== */
.product-container {
    max-width: 1300px;
    margin: 40px auto;
    padding: 0 40px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
}

/* Multi-Image Gallery */
.product-gallery {
    display: flex;
    gap: 20px;
}

.thumbnail-column {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 80px;
}

.thumb {
    width: 100%;
    aspect-ratio: 4 / 5;
    background-color: var(--light-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #999;
    transition: var(--transition);
}

.thumb.active, .thumb:hover {
    border-color: var(--primary);
}

.main-image {
    flex: 1;
    background-color: var(--light-bg);
    aspect-ratio: 4 / 5;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    font-size: 1.2rem;
    color: #666;
}

/* Product Info Column */
.product-info h2 {
    font-size: 2.2rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 15px;
    line-height: 1.2;
}

.price-container {
    margin-bottom: 30px;
}

.price {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--primary);
}

/* Interactive Options */
.selector-group {
    margin-bottom: 25px;
}

.selector-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--secondary);
    margin-bottom: 10px;
    display: block;
}

.options-grid {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.option-btn {
    background: none;
    border: 1px solid #cccccc;
    padding: 12px 20px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: var(--transition);
}

.option-btn:hover {
    border-color: var(--primary);
}

.option-btn.selected {
    background-color: var(--primary);
    color: var(--white);
    border-color: var(--primary);
}

/* Purchase Buttons */
.purchase-actions {
    margin-top: 40px;
}

.btn-primary {
    width: 100%;
    background-color: var(--primary);
    color: var(--white);
    border: 1px solid var(--primary);
    padding: 18px;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: var(--transition);
}

.btn-primary:hover {
    background-color: transparent;
    color: var(--primary);
}

/* Trust Badges Styling */
.trust-badges {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 0.8rem;
    color: var(--secondary);
}

.badge-item {
    display: flex;
    align-items: center;
    gap: 6px;
}

/* ==========================================================================
   4. PREVIEW POPUP BAG (DRAWER)
   ========================================================================== */
.cart-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.4);
    z-index: 1000;
    display: none;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.cart-drawer {
    position: fixed;
    top: 0;
    right: -450px;
    width: 100%;
    max-width: 450px;
    height: 100%;
    background-color: var(--white);
    z-index: 1001;
    box-shadow: -5px 0 15px rgba(0,0,0,0.05);
    transition: right 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    padding: 30px;
    display: flex;
    flex-direction: column;
}

.cart-overlay.open {
    display: block;
    opacity: 1;
}

.cart-drawer.open {
    right: 0;
}

.cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 20px;
}

.cart-header h3 {
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1.1rem;
}

.close-drawer {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
}

.cart-items {
    flex: 1;
    overflow-y: auto;
}

.cart-item {
    display: flex;
    gap: 15px;
    padding: 15px 0;
    border-bottom: 1px solid var(--border);
}

.cart-item-img {
    width: 70px;
    aspect-ratio: 4/5;
    background-color: var(--light-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: #999;
}

.cart-item-details {
    flex: 1;
}

.cart-item-details h4 {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 4px;
}

.cart-item-meta {
    font-size: 0.8rem;
    color: var(--secondary);
    margin-bottom: 4px;
}

.cart-footer {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    margin-top: 20px;
}

.subtotal-row {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    margin-bottom: 20px;
}

/* Secure Checkout Link Button */
.btn-checkout {
    display: block;
    width: 100%;
    background-color: var(--success);
    color: var(--white);
    border: 1px solid var(--success);
    padding: 16px;
    font-size: 1rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: center;
    text-decoration: none;
    transition: var(--transition);
    cursor: pointer;
}

.btn-checkout:hover {
    background-color: transparent;
    color: var(--success);
}

.secure-notice {
    display: block;
    text-align: center;
    font-size: 0.75rem;
    color: var(--secondary);
    margin-top: 10px;
}

/* Responsive adjustments */
@media (max-width: 900px) {
    .product-container {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 0 20px;
    }
    .product-gallery {
        flex-direction: column-reverse;
    }
    .thumbnail-column {
        flex-direction: row;
        width: 100%;
    }
    .thumb {
        width: 70px;
    }
    header {
        padding: 20px;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <h1>The Lace Wigs</h1>
    </div>
    <nav>
        <ul>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#" class="cart-link" onclick="toggleCart(true)">Bag <span id="bag-count">1</span></a></li>
        </ul>
    </nav>
</header>

<main class="product-container">
    <!-- Media Visuals -->
    <section class="product-gallery">
        <div class="thumbnail-column">
            <div class="thumb active" onclick="changeImage('Front View', this)">Angle 1</div>
            <div class="thumb" onclick="changeImage('Side View', this)">Angle 2</div>
            <div class="thumb" onclick="changeImage('Lace Detail', this)">Angle 3</div>
        </div>
        <div class="main-image" id="main-product-display">
            Front View
        </div>
    </section>

    <!-- Product Details & Actions -->
    <section class="product-info">
        <h2>613 Blonde Straight 13x4 Lace Front Wig</h2>
        <div class="price-container">
            <span class="price" id="product-price">$299.00</span>
        </div>
        
        <div class="selector-group">
            <span class="selector-label">Length</span>
            <div class="options-grid">
                <button class="option-btn" onclick="selectOption(this, 'length', 0)">18"</button>
                <button class="option-btn selected" onclick="selectOption(this, 'length', 50)">22"</button>
                <button class="option-btn" onclick="selectOption(this, 'length', 100)">26"</button>
            </div>
        </div>
        
        <div class="selector-group">
            <span class="selector-label">Density</span>
            <div class="options-grid">
                <button class="option-btn selected" onclick="selectOption(this, 'density', 0)">150%</button>
