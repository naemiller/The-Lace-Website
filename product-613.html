<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>613 Blonde Straight 13x4 Lace Front Wig | The Lace Wigs</title>
  <style>
    /* ==========================================================================
       1. CORE BRAND DESIGN SYSTEM
       ========================================================================== */
    :root {
      --primary: #111111;
      --secondary: #555555;
      --accent: #d4af37; /* Luxury Gold */
      --light-bg: #fafafa;
      --border: #eeeeee;
      --white: #ffffff;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--white);
      color: var(--primary);
      line-height: 1.6;
    }

    /* ==========================================================================
       2. STICKY HEADER NAVIGATION
       ========================================================================== */
    header {
      background-color: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 35px;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--secondary);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    nav ul li a:hover, nav ul li a.active {
      color: var(--primary);
    }

    #bag-count {
      background-color: var(--primary);
      color: var(--white);
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 50%;
      margin-left: 4px;
      display: inline-block;
      vertical-align: middle;
      font-weight: bold;
    }

    /* ==========================================================================
       3. PRODUCT CONTAINER WORKSPACE
       ========================================================================== */
    .product-main-container {
      max-width: 1200px;
      margin: 40px auto 100px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 50px;
    }

    /* Image Gallery Components */
    .gallery-stack {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .main-canvas {
      width: 100%;
      height: 550px;
      background-color: var(--light-bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .main-canvas img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }

    .thumb-node {
      height: 90px;
      background-color: var(--light-bg);
      border: 1px solid transparent;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
    }

    .thumb-node.active, .thumb-node:hover {
      border-color: var(--primary);
      opacity: 0.8;
    }

    .thumb-node img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Configuration Panel (Right Side) */
    .config-panel {
      display: flex;
      flex-direction: column;
    }

    .breadcrumb {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--secondary);
      margin-bottom: 10px;
    }

    .config-panel h2 {
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .stars {
      color: var(--accent);
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .metrics-text {
      font-size: 0.85rem;
      color: var(--secondary);
      font-weight: 500;
    }

    .master-price {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 25px;
    }

    /* Selection Label Controls */
    .selector-block {
      margin-bottom: 24px;
    }

    .selector-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .options-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .option-label {
      position: relative;
      cursor: pointer;
    }

    .option-label input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .option-box {
      border: 1px solid #dddddd;
      padding: 10px 18px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background-color: var(--white);
      transition: var(--transition);
      border-radius: 2px;
    }

    .option-label input:checked + .option-box {
      border-color: var(--primary);
      background-color: var(--primary);
      color: var(--white);
    }

    .option-label:hover .option-box {
      border-color: var(--primary);
    }

    /* Add To Bag System Elements */
    .purchase-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 15px;
      margin-top: 30px;
      margin-bottom: 35px;
    }

    .qty-box {
      width: 100%;
      padding: 14px;
      border: 1px solid #dddddd;
      font-size: 1rem;
      text-align: center;
      font-weight: bold;
      outline: none;
    }

    .add-to-bag-btn {
      background-color: var(--primary);
      color: var(--white);
      border: none;
      padding: 16px;
      font-size: 0.95rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 2px;
    }

    .add-to-bag-btn:hover {
      background-color: var(--accent);
    }

    /* Informational Notes Layout */
    .production-note {
      font-size: 0.85rem;
      color: var(--secondary);
      background-color: var(--light-bg);
      padding: 15px;
      border-left: 2px solid var(--accent);
      margin-bottom: 35px;
    }

    .description-details {
      border-top: 1px solid var(--border);
      padding-top: 25px;
      margin-bottom: 30px;
    }

    .description-details h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .bullet-spec-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .bullet-spec-list li {
      font-size: 0.9srem;
      color: var(--secondary);
      margin-bottom: 8px;
      position: relative;
      padding-left: 20px;
    }

    .bullet-spec-list li::before {
      content: '✦';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .description-details p {
      font-size: 0.9rem;
      color: var(--secondary);
      line-height: 1.6;
    }

    /* ==========================================================================
       4. TRUST PROTCOLS BADGES PANEL
       ========================================================================== */
    .secure-trust-panel {
      border-top: 1px solid var(--border);
      padding-top: 30px;
      text-align: center;
    }

    .secure-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      color: var(--secondary);
      margin-bottom: 15px;
    }

    .trust-badges-grid {
      display: flex;
      justify-content: center;
      gap: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .badge-icon-symbol {
      font-size: 1.4rem;
    }

    .badge-label-string {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
      color: var(--secondary);
    }

    /* Responsive Logic */
    @media (max-width: 900px) {
      .product-main-container { grid-template-columns: 1fr; gap: 40px; margin: 20px auto; }
      .main-canvas { height: 450px; }
    }
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 15px; padding: 15px; }
      .product-main-container { padding: 0 15px; }
      .thumb-node { height: 70px; }
    }
  </style>
</head>
