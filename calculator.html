<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wig Size Calculator | The Lace Wigs</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #fafafa; color: #111111; }
        header { background-color: #ffffff; border-bottom: 1px solid #eeeeee; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo h1 { font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        nav ul { display: flex; list-style: none; gap: 35px; }
        nav ul li a { text-decoration: none; color: #555555; font-size: 0.95rem; font-weight: 500; }
        #bag-count { background-color: #000000; color: #ffffff; font-size: 0.75rem; padding: 2px 7px; border-radius: 50%; }
        .calc-wrapper { max-width: 650px; background: #ffffff; margin: 60px auto; padding: 40px; border-radius: 8px; border: 1px solid #e5e5e5; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; outline: none; }
        input[type="number"]:focus { border-color: #000; }
        .submit-btn { background-color: #000000; color: #ffffff; border: none; width: 100%; padding: 15px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-radius: 4px; margin-top: 15px; }
        .submit-btn:hover { background-color: #333; }
        .results { display: none; margin-top: 25px; padding: 20px; background: #f9f9f9; border-left: 4px solid #000; }
        .embed-box { max-width: 650px; margin: 40px auto; background: #eee; padding: 20px; border-radius: 4px; border: 1px dashed #ccc; }
        textarea { width: 100%; height: 50px; resize: none; background: #fff; border: 1px solid #ccc; padding: 5px; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>The Lace Wigs</h1></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="calculator.html" style="color:#000; font-weight:bold;">Size Guide</a></li>
                <li><a href="login.html">Account</a></li>
                <li><a href="bag.html">Bag <span id="bag-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main class="calc-wrapper">
        <h2 style="text-align:center; margin-bottom:10px;">Find Your Perfect Wig Size</h2>
        <p style="text-align:center; color:#666; margin-bottom:30px; font-size:0.95rem;">Enter your measurements in inches to locate your cap size match.</p>
        
        <form id="standaloneCalcForm" onsubmit="runStandaloneCalc(event)">
            <div style="margin-bottom: 20px;">
                <label style="font-weight:500;">1. Head Circumference (Inches)</label>
                <input type="number" id="calcCircum" step="0.1" min="18" max="26" placeholder="e.g. 21.5" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="font-weight:500;">2. Front to Nape (Inches)</label>
                <input type="number" id="calcNape" step="0.1" min="10" max="17" placeholder="e.g. 14.0" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="font-weight:500;">3. Ear-to-Ear Across Forehead (Inches)</label>
                <input type="number" id="calcEar" step="0.1" min="10" max="15" placeholder="e.g. 11.5" required>
            </div>
            <button type="submit" class="submit-btn">Calculate Cap Size</button>
        </form>

        <div id="calcResults" class="results">
            <p style="font-weight:600;">Your Recommended Cap Size:</p>
            <div id="sizeBadge" style="display:inline-block; background:#000; color:#fff; padding:6px 12px; font-weight:bold; margin:10px 0; border-radius:4px;">Medium</div>
            <p id="sizeDesc" style="color:#555; font-size:0.9rem; line-height:1.4;"></p>
        </div>
    </main>

    <section class="embed-box">
        <h4 style="font-size:0.85rem; margin-bottom:5px;">Share or embed this tool on your fashion blog:</h4>
        <textarea readonly><a href="https://thelacewigs.com">Wig Size Calculator by The Lace Wigs</a></textarea>
    </section>

    <script>
        function runStandaloneCalc(event) {
            event.preventDefault();
            const circum = parseFloat(document.getElementById('calcCircum').value);
            const nape = parseFloat(document.getElementById('calcNape').value);
            const ear = parseFloat(document.getElementById('calcEar').value);
            
            const results = document.getElementById('calcResults');
            const badge = document.getElementById('sizeBadge');
            const desc = document.getElementById('sizeDesc');

            let size = "Average (Medium)", text = "Standard average industry scale parameters.";

            if (circum <= 20.5 || nape <= 12.5 || ear <= 10.5) {
                size = "Ultra Petite / Kids"; text = "Dimensions sit below regular adult profile brackets.";
            } else if (circum > 20.5 && circum <= 21.5) {
                size = "Petite (Small)"; text = "A small 21-inch configuration avoids slipping.";
            } else if (circum > 21.5 && circum <= 22.5) {
                size = "Average (Medium)"; text = "Fits off-the-rack builds cleanly with built-in straps.";
            } else if (circum > 22.5) {
                size = "Large"; text = "Wider scaling footprint profile prevents edge strain.";
            }

            badge.textContent = size;
            desc.textContent = text;
            results.style.display = 'block';
        }
    </script>
</body>
</html>
