<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarHair 13"x4" HD Lace Straight 180% Frontal Wig #1B | The Lace Wigs</title>
  <style>
    /* ==========================================================================
       1. CORE BRAND RESET & LOGIC VARIABLES
       ========================================================================== */
    :root {
      --primary: #111111;
      --secondary: #555555;
      --accent: #ab8e64;
      --gold: #d4af37;
      --light-bg: #f9f9f9;
      --border: #eeeeee;
      --stock-red: #c0392b;
      --font: 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
    body { background-color: #ffffff; color: var(--primary); line-height: 1.6; }

    /* ==========================================================================
       2. NAVIGATION HEADER BAR
       ========================================================================== */
    header {
      background-color: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo h1 { font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    nav ul { display: flex; list-style: none; gap: 35px; align-items: center; }
    nav ul li a { text-decoration: none; color: var(--secondary); font-size: 0.95rem; font-weight: 500; }
    nav ul li a:hover, nav ul li a.active { color: var(--primary); }
    #bag-count { background-color: var(--primary); color: #ffffff; font-size: 0.75rem; padding: 2px 7px; border-radius: 50%; margin-left: 4px; }

    /* ==========================================================================
       3. PRODUCT CONTAINER & GALLERY SYSTEM
       ========================================================================== */
    .product-wrapper {
      max-width: 1300px;
      margin: 40px auto;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 50px;
    }
    .gallery-container { display: flex; flex-direction: column; gap: 15px; }
    .main-image { width: 100%; height: 600px; background-color: var(--light-bg); object-fit: cover; border-radius: 4px; }
    .thumbnail-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .thumb-img { width: 100%; height: 100px; object-fit: cover; cursor: pointer; border: 1px solid transparent; border-radius: 2px; opacity: 0.7; transition: all 0.2s; }
    .thumb-img:hover, .thumb-img.active { border-color: var(--primary); opacity: 1; }

    /* ==========================================================================
       4. CONTEXT FIELDS & MULTI-OPTION SELECTION LOGIC
       ========================================================================== */
    .details-panel { display: flex; flex-direction: column; }
    .vendor-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--secondary); margin-bottom: 5px; }
    .product-title { font-size: 2rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; line-height: 1.3; margin-bottom: 10px; }
    
    .rating-block { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    .stars { color: var(--gold); letter-spacing: 1px; font-size: 0.95rem; }
    .metrics { font-size: 0.85rem; color: var(--secondary); font-weight: 500; }

    .price-display { font-size: 1.6rem; font-weight: bold; color: var(--primary); margin-bottom: 25px; }
    
    .option-group { margin-bottom: 20px; }
    .option-label { display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px; }
    .pill-box { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill { padding: 10px 20px; border: 1px solid var(--border); background: none; font-size: 0.9rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .pill:hover { border-color: var(--primary); }
    .pill.active { border-color: var(--primary); background-color: var(--primary); color: #ffffff; font-weight: bold; }

    /* Inventory Status Notification */
    .stock-counter { font-size: 0.9rem; color: var(--stock-red); font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }

    /* Quantity Box Setup */
    .qty-selector { display: flex; align-items: center; border: 1px solid var(--border); width: 120px; justify-content: space-between; margin-bottom: 20px; }
    .qty-btn { width: 35px; height: 40px; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    .qty-input { width: 50px; text-align: center; border: none; font-size: 1rem; outline: none; }

    /* Action Buttons Row */
    .action-btn { width: 100%; padding: 16px; font-size: 0.95rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; margin-bottom: 15px; transition: all 0.2s; }
    .add-to-bag { background-color: var(--primary); color: #ffffff; border: 1px solid var(--primary); }
    .add-to-bag:hover { background-color: #333333; }

    /* Trust Seals Banner Layout */
    .trust-seals-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 20px 0; margin: 25px 0; gap: 10px; text-align: center; }
    .seal-item h5 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .seal-item p { font-size: 0.8rem; color: var(--secondary); }

    .bullet-specs { list-style-position: inside; font-size: 0.9rem; color: var(--secondary); gap: 8px; display: flex; flex-direction: column; margin-top: 10px; }

    /* ==========================================================================
       5. SUPPLIER HAIR GRADES COMPARISON TABLE GRID
       ========================================================================== */
    .comparison-section { max-width: 1300px; margin: 80px auto; padding: 0 40px; }
    .comparison-section h3 { text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 40px; }
    .comparison-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .grade-card { border: 1px solid var(--border); border-radius: 4px; padding: 25px; display: flex; flex-direction: column; }
    .grade-card.highlight { border-color: var(--accent); background-color: var(--light-bg); }
    .grade-title { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .grade-subtitle { font-size: 0.8rem; color: var(--secondary); text-transform: uppercase; margin-bottom: 15px; }
    .grade-price { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; }
    .spec-row { margin-bottom: 15px; font-size: 0.85rem; }
    .spec-row strong { display: block; text-transform: uppercase; font-size: 0.7rem; color: var(--secondary); letter-spacing: 0.5px; margin-bottom: 2px; }

    /* ==========================================================================
       6. COMPREHENSIVE FOOTER DESIGN SYSTEM
       ========================================================================== */
    footer { background-color: var(--primary); color: #ffffff; padding: 60px 40px; margin-top: 100px; }
    .footer-content { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr repeat(2, 1fr); gap: 50px; }
    .footer-brand h4 { font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
    .footer-brand p { color: #999999; font-size: 0.95rem; line-height: 1.6; max-width: 400px; }
    .footer-links h5 { font-size: 0.9rem; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px; }
    .footer-links ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .footer-links ul li a { color: #999999; text-decoration: none; font-size: 0.9rem; }
    .footer-links ul li a:hover { color: #ffffff; }
    .footer-bottom { max-width: 1200px; margin: 40px auto 0; padding-top: 30px; border-top: 1px solid #222222; text-align: center; color: #666666; font-size: 0.85rem; }

    /* ==========================================================================
       7. RESPONSIVE LAYER
       ========================================================================== */
    @media (max-width: 991px) {
      .product-wrapper { grid-template-columns: 1fr; gap: 40px; padding: 0 20px; }
      .main-image { height: 450px; }
      .comparison-grid { grid-template-columns: 1fr; gap: 30px; }
    }
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 15px; padding: 15px; }
      .footer-content { grid-template-columns: 1fr; gap: 30px; }
    }
  </style>
</head>
