<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DB5KS31CSH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-DB5KS31CSH');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Bag | The Lace Wigs</title>
  
  <!-- CORRECT STRIPE FRONTEND LIBRARY SDK -->
  <script src="https://stripe.com"></script>
  
  <style>
    /* ==========================================================================
       1. CORE BRAND DESIGN SYSTEM
       ========================================================================= */
    :root {
      --primary: #111111;
      --secondary: #555555;
      --accent: #d4af37; /* Luxury Gold */
      --light-bg: #fafafa;
      --border: #eeeeee;
      --white: #ffffff;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--white);
      color: var(--primary);
      line-height: 1.6;
    }

    /* ==========================================================================
       2. STICKY HEADER NAVIGATION
       ========================================================================== */
    header {
      background-color: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 35px;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--secondary);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    nav ul li a:hover, nav ul li a.active {
      color: var(--primary);
    }

    #bag-count {
      background-color: var(--primary);
      color: var(--white);
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 50%;
      margin-left: 4px;
      display: inline-block;
      font-weight: bold;
    }

    /* ==========================================================================
       3. SHOPPING BAG TWO-COLUMN MATRIX
       ========================================================================== */
    .bag-container {
      max-width: 1200px;
      margin: 60px auto 100px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 50px;
    }

    .bag-container h2 {
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 30px;
      grid-column: 1 / -1;
    }

    /* Cart Items Showcase List */
    .cart-items-panel {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .empty-cart-msg {
      padding: 60px 40px;
      text-align: center;
      background-color: var(--light-bg);
      border: 1px dashed #cccccc;
      color: var(--secondary);
    }

    .empty-cart-msg p {
      margin-bottom: 20px;
      font-size: 1.1rem;
    }

    .shop-btn {
      display: inline-block;
      background-color: var(--primary);
      color: var(--white);
      padding: 12px 30px;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 1px;
      transition: var(--transition);
    }

    .shop-btn:hover {
      background-color: var(--accent);
    }

    .cart-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 20px;
      padding-bottom: 25px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .cart-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background-color: var(--light-bg);
      border-radius: 2px;
    }

    .item-details h4 {
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .item-details p {
      font-size: 0.85rem;
      color: var(--secondary);
      margin-bottom: 4px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .qty-btn {
      background: none;
      border: 1px solid var(--border);
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      transition: var(--transition);
    }

    .qty-btn:hover {
      border-color: var(--primary);
    }

    .qty-val {
      font-size: 0.9rem;
      font-weight: bold;
    }

    .item-remove-btn {
      background: none;
      border: none;
      color: #c0392b;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: underline;
      margin-left: 15px;
    }

    .item-price-block {
      font-weight: bold;
      font-size: 1.1rem;
      text-align: right;
    }

    /* Checkout & Summary Panel (Right Side) */
    .checkout-summary-panel {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .summary-box {
      background-color: var(--light-bg);
      border: 1px solid var(--border);
      padding: 30px;
      border-radius: 4px;
    }

    .summary-box h3 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 0.95rem;
    }

    .summary-row.total {
      border-top: 1px solid var(--border);
      padding-top: 15px;
      font-weight: bold;
      font-size: 1.2rem;
      margin-top: 10px;
      margin-bottom: 0;
    }

    /* New Mandatory Guest Contact Elements Form */
    .guest-checkout-box {
      border: 1px solid var(--border);
      padding: 30px;
      border-radius: 4px;
      background-color: var(--white);
    }

    .guest-checkout-box h3 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 0.9rem;
      outline: none;
      background-color: var(--light-bg);
      transition: var(--transition);
    }

    .form-group input:focus {
      border-color: var(--primary);
      background-color: var(--white);
    }

    .place-order-btn {
      width: 100%;
      background-color: var(--primary);
      color: var(--white);
      border: none;
      padding: 18px;
      font-size: 0.95rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 2px;
      margin-top: 10px;
    }

    .place-order-btn:hover {
      background-color: var(--accent);
    }

    /* Trust Badges Integration Row */
    .trust-badges-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Responsive Configurations FIXED CLOSING BRACE */
    @media (max-width: 900px) {
      .bag-container {
        grid-template-columns: 1fr;
        gap: 30px;
        margin: 30px auto 60px;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <h1 onclick="window.location.href='index.html'">The Lace Wigs</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Shop All</a></li>
        <li><a href="bag.html" class="active">Bag (<span id="bag-count">0</span>)</a></li>
      </ul>
    </nav>
  </header>

  <main class="bag-container">
    <h2>Your Shopping Bag</h2>

    <!-- LEFT COLUMN: Dynamic Items Injection Panel -->
    <section class="cart-items-panel" id="cart-items-panel">
      <!-- Injected dynamically via JavaScript below -->
    </section>

    <!-- RIGHT COLUMN: Price Calculation & Payment Processing -->
    <section class="checkout-summary-panel" id="checkout-summary-panel">
      <div class="summary-box">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span style="color: var(--accent); font-weight: bold;">Calculated at checkout</span>
        </div>
        <div class="summary-row total">
          <span>Total Est.</span>
          <span id="summary-total">$0.00</span>
        </div>
      </div>

      <div class="guest-checkout-box">
        <h3>Customer Contact</h3>
        <form id="checkout-form">
          <div class="form-group">
            <label for="guest-email">Email Address</label>
            <input type="email" id="guest-email" placeholder="name@domain.com" required>
          </div>
