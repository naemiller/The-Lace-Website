<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | The Lace Website</title>
  <style>
    /* Premium Luxury Styling Variables */
    :root {
      --primary-color: #000000;
      --accent-color: #ab8e64;
      --light-bg: #faf7f2;
      --border-color: #e5dec9;
    }

    body {
      font-family: 'Playfair Display', 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #111111;
      -webkit-font-smoothing: antialiased;
    }

    /* Premium Custom Scrollbars */
    ::-webkit-scrollbar { 
      width: 6px; 
    } 
    ::-webkit-scrollbar-track { 
      background: #f1f1f1; 
    } 
    ::-webkit-scrollbar-thumb { 
      background: var(--accent-color); 
      border-radius: 3px; 
    }

    /* Header & Navigation Layout */
    header {
      background: #ffffff;
      padding: 30px 5% 15px 5%;
      text-align: center;
    }

    header h1 {
      font-size: 38px;
      font-weight: 400;
      letter-spacing: 3px;
      margin: 0 0 20px 0;
      text-transform: uppercase;
    }

    nav {
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 0;
    }

    nav a {
      color: var(--primary-color);
      text-decoration: none;
      margin: 0 18px;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 1.5px;
      transition: color 0.3s;
    }

    nav a.active {
      color: var(--accent-color);
      font-weight: bold;
    }

    .section-title {
      font-size: 20px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      margin-bottom: 25px; 
      text-align: center;
      font-weight: 400;
    }

    /* Featured Slider Setup */
    .carousel-container { 
      padding: 40px 5% 20px 5%; 
      max-width: 1400px; 
      margin: 0 auto; 
    } 

    .carousel-wrapper { 
      position: relative; 
      display: flex; 
      align-items: center; 
    } 

    .carousel-track-container { 
      overflow: hidden; 
      width: 100%; 
    } 

    .carousel-track { 
      display: flex; 
      gap: 20px; 
      transition: transform 0.5s ease-in-out; 
    } 

    .carousel-item { 
      min-width: calc(33.333% - 14px); 
      background: #ffffff; 
      border: 1px solid var(--border-color); 
      border-radius: 4px; 
      padding: 20px; 
      text-align: center; 
      box-sizing: border-box; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    } 

    .carousel-item img { 
      width: 100%; 
      height: 260px; 
      object-fit: cover; 
      margin-bottom: 15px; 
      border-radius: 4px;
    } 

    .carousel-item h4 { 
      font-size: 15px; 
      margin: 10px 0 6px 0; 
      font-weight: 600;
      text-transform: uppercase;
    } 

    .carousel-item p { 
      color: var(--accent-color); 
      font-weight: 700; 
      font-size: 16px;
      margin: 0;
    } 

    .carousel-nav { 
      background: var(--primary-color); 
      color: #fff; 
      border: none; 
      width: 42px; 
      height: 42px; 
      border-radius: 50%; 
      cursor: pointer; 
      position: absolute; 
      z-index: 10; 
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    } 

    .prev-btn { left: -20px; } 
    .next-btn { right: -20px; } 

    .carousel-dots { 
      display: flex; 
      justify-content: center; 
      gap: 8px; 
      margin-top: 20px; 
    } 
    .dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; cursor: pointer; } 
    .dot.active { background: var(--accent-color); } 

    /* Workspace Lower Grid System Split */
    .main-layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 5% 60px 5%;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
    }

    .column-heading {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      font-weight: 600;
      text-align: center;
    }

    /* Admin Panel Interface Form Box */
    .admin-panel { 
      background: #ffffff; 
      padding: 25px 20px; 
      border: 1px dashed var(--accent-color); 
      border-radius: 6px; 
    } 

    .admin-panel h3 { 
      color: var(--primary-color); 
      font-size: 16px; 
      margin-top: 0;
      margin-bottom: 20px;
      text-transform: uppercase;
      text-align: center;
      letter-spacing: 1px;
    } 

    .form-group { margin-bottom: 16px; } 
    .form-group label { 
      display: block; 
      font-size: 11px; 
      text-transform: uppercase; 
      font-weight: bold; 
      margin-bottom: 6px; 
      letter-spacing: 0.5px;
    } 

    .form-group input { 
      width: 100%; 
      padding: 10px; 
      border: 1px solid var(--border-color); 
      border-radius: 4px; 
      background: #fff; 
      font-size: 13px; 
      box-sizing: border-box;
    } 

    .submit-product-btn { 
      width: 100%; 
      background: #c3ab87; 
      color: white; 
      border: none; 
      padding: 12px; 
      font-weight: bold; 
      text-transform: uppercase; 
      cursor: pointer; 
      border-radius: 4px; 
      letter-spacing: 1px;
      font-size: 13px;
      transition: background 0.3s; 
    } 
    .submit-product-btn:hover { background: var(--accent-color); } 

    /* Catalog Storefront Product Grid Elements */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 15px;
      text-align: center;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      margin-bottom: 12px;
      border-radius: 2px;
    }

    .product-card h3 {
      font-size: 13px;
      margin: 8px 0;
      color: var(--primary-color);
      text-transform: uppercase;
      font-weight: 600;
      line-height: 1.4;
    }

    .product-card .price {
      color: var(--accent-color);
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .add-to-cart-btn {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 0;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    .add-to-cart-btn:hover { background: var(--accent-color); } 

    /* Responsive Viewport Rules */
    @media (max-width: 950px) {
      .main-layout { grid-template-columns: 1fr; }
      .carousel-item { min-width: calc(50% - 10px); }
    } 
    @media (max-width: 600px) { 
      .carousel-item { min-width: 100%; } 
      .prev-btn { left: 5px; } 
      .next-btn { right: 5px; } 
    }
  </style>
</head>
<body>

  <!-- Navigation Header Block -->
  <header>
    <h1>The Lace Website</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Featured Slider Module -->
  <section class="carousel-container">
    <h2 class="section-title">Featured Luxury Wigs</h2>
    <div class="carousel-wrapper">
      <button class="carousel-nav prev-btn" id="prevBtn">&#10094;</button>
      <div class="carousel-track-container">
        <div class="carousel-track" id="carouselTrack">
          
          <div class="carousel-item">
            <img src="https://unsplash.com" alt="Silky Straight Wig">
            <h4>HD Lace Frontal Unit - Silky Straight</h4>
            <p>£580</p>
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com" alt="Body Wave Wig">
            <h4>Transparent Closure Wig - Body Wave</h4>
            <p>£490</p>
          </div>
          <div class="carousel-item">
            <img src="https://unsplash.com" alt="Deep Wave Wig">
            <h4>5x5 Closure Wig - Deep Wave</h4>
            <p>£520</p>
          </div>

        </div>
      </div>
      <button class="carousel-nav next-btn" id="nextBtn">&#10095;</button>
    </div>
    <div class="carousel-dots" id="carouselDots"></div>
  </section>

  <!-- Lower Split Dashboard Layout -->
  <main class="main-layout">
    
    <!-- Left Admin Bar -->
    <aside>
      <div class="column-heading">Inventory Controls</div>
      <div class="admin-panel">
        <h3>Admin Panel</h3>
        <form id="productForm">
          <div class="form-group">
            <label for="pName">Product Name</label>
            <input type="text" id="pName" value="13x4 Lace Frontal Wig" required>
          </div>
          <div class="form-group">
            <label for="pPrice">Product Price</label>
            <input type="text" id="pPrice" value="£650" required>
          </div>
          <div class="form-group">
            <label for="pImg">Product Image URL</label>
            <input type="text" id="pImg" value="url_of_the_wig_image.jpg" required>
          </div>
          <button type="submit" class="submit-product-btn">Deploy Product</button>
        </form>
      </div>
    </aside>

    <!-- Right Live Shop Grid Workspace -->
    <section>
      <div class="column-heading">All Master Collections</div>
      <div class="products-grid" id="productsGrid">
        
        <div class="product-card">
          <img src="https://unsplash.com" alt="Wig Unit">
          <h3>HD Lace Frontal Unit - Silky Straight</h3>
