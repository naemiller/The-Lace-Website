<!-- Load core modular scripts through secure browser channels -->
<script type="module">
  // 1. FIXED PATHS: Points to official, live Firebase CDN files
  import { initializeApp } from "https://gstatic.com";
  import { getFirestore, collection, getDocs } from "https://gstatic.com";

  // 2. FIXED CONFIG: Formatted target authDomain and databaseURL locations
  const firebaseConfig = {
    apiKey: "AIzaSyCkzgI6bFXO8ukneBoImXSJyMNxRNIEhDI",
    authDomain: "thelacewigs-f46a5.firebaseapp.com",
    databaseURL: "https://firebaseio.com",
    projectId: "thelacewigs-f46a5",
    storageBucket: "thelacewigs-f46a5.firebasestorage.app",
    messagingSenderId: "1004049108512",
    appId: "1:1004049108512:web:4ec7cdf3e2cf683f183645"
  };

  // Instantiate client connection tokens
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const shopGrid = document.getElementById("shopGrid");
  const loaderStateText = document.getElementById("loaderStateText");
  const paginationBox = document.getElementById("paginationBox");
  const pageNumbersSpan = document.getElementById("pageNumbers");
  const prevBtn = document.getElementById("prevPage");
  const nextBtn = document.getElementById("nextPage");

  let allProducts = [];
  let currentPage = 1;
  const itemsPerPage = 12;

  async function loadCatalog() {
    try {
      const querySnapshot = await getDocs(collection(db, "products"));
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        allProducts.push({
          id: doc.id,
          name: data.name || "Luxury Hair Unit",
          price: data.price !== undefined ? data.price : "0", 
          imageUrl: data.imageUrl || "straight.jpg"
        });
      });

      if (allProducts.length === 0) {
        shopGrid.innerHTML = '<div class="loading-text">Connected to Firebase! But your collection has no documents inside it yet.</div>';
        return;
      }

      if (loaderStateText) loaderStateText.remove();
      renderPaginationControls();
      showPage(1);
    } catch (err) {
      console.error("DATABASE API FAILURE: ", err);
      shopGrid.innerHTML = '<div class="loading-text" style="color:red;">Error loading items. Make sure your Firestore rules allow public reads.</div>';
    }
  }

  function renderPaginationControls() {
    const totalPages = Math.ceil(allProducts.length / itemsPerPage);
    pageNumbersSpan.innerHTML = "";

    if (totalPages <= 1) {
      paginationBox.style.display = "none";
      return;
    }

    paginationBox.style.display = "flex";

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.className = `page-number ${i === 1 ? 'active' : ''}`;
      btn.textContent = i;
      btn.setAttribute("data-target", i);
      btn.addEventListener("click", () => showPage(i));
      pageNumbersSpan.appendChild(btn);
    }

    prevBtn.onclick = () => {
      if (currentPage > 1) showPage(currentPage - 1);
    };
    nextBtn.onclick = () => {
      if (currentPage < totalPages) showPage(currentPage + 1);
    };
  }

  function showPage(page) {
    currentPage = page;
    shopGrid.innerHTML = "";

    // Highlight the active page number button
    document.querySelectorAll('.page-number').forEach(btn => {
      if (parseInt(btn.getAttribute('data-target')) === page) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // Control structural navigation button visibility bounds
    const totalPages = Math.ceil(allProducts.length / itemsPerPage);
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;

    const startIndex = (page - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const pageItems = allProducts.slice(startIndex, endIndex);

    pageItems.forEach(product => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <div class="product-image-wrapper">
          <img src="${product.imageUrl}" alt="${product.name}" onerror="this.src='straight.jpg'">
        </div>
        <h4>${product.name}</h4>
        <p class="price">$${product.price}</p>
        <button class="add-to-bag" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}">Add to Bag</button>
      `;
      shopGrid.appendChild(card);
    });
  } // FIXED SYNTAX: Properly closes the showPage function parameters

  // 3. FIXED TRIGGER: Explicitly run the database collection request routine
  loadCatalog();
</script>
</body>
</html>
