<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lace Wigs | Shop Professional HD Lace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Job-Ready Enhancement: Sticky Filter Bar */
        .filter-bar {
            background: #0a0a0a;
            padding: 20px;
            position: sticky;
            top: 70px;
            z-index: 900;
            border-bottom: 1px solid #111;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        .filter-bar input, .filter-bar select {
            background: #111;
            border: 1px solid #222;
            color: white;
            padding: 12px;
            min-width: 200px;
        }
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 50px;
            color: #555;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">THE LACE WIGS</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" style="color: var(--gold);">Shop</a></li>
            <li><a href="about.html">Our Story</a></li>
            <li><a href="#" onclick="toggleCart()">Bag (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <!-- Professional Feature: Multi-Filter and Sorting Controls -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search by name or texture..." oninput="handleFilterChange()">
        
        <select id="categoryFilter" onchange="handleFilterChange()">
            <option value="all">All Textures</option>
            <option value="Straight">Straight</option>
            <option value="Body Wave">Body Wave</option>
            <option value="Curly">Curly</option>
        </select>

        <select id="sortOrder" onchange="handleFilterChange()">
            <option value="default">Sort By: Featured</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>
    </div>

    <div class="container">
        <div class="grid" id="product-grid">
            <!-- Products injected by JS -->
        </div>
    </div>

    <!-- UI Overlay and Cart Modal -->
    <div class="overlay" id="overlay" onclick="closeAll()"></div>
    <div id="cart-modal">
        <h2>Your Bag</h2>
        <div id="cart-items"></div>
        <hr style="border-color: #222;">
        <p><strong>Subtotal: $<span id="cart-total">0.00</span></strong></p>
        <button class="btn btn-primary" onclick="alert('Checkout integration ready.')">Checkout</button>
    </div>

    <script>
        // Feature: Centralized Data (Easily movable to an API/Database)
        const products = [
            { id: 1, name: "HD Frontal - Body Wave", price: 350, type: "Body Wave", rating: "★★★★★" },
            { id: 2, name: "Full Lace - Straight Silky", price: 420, type: "Straight", rating: "★★★★★" },
            { id: 3, name: "Glueless - Curly", price: 280, type: "Curly", rating: "★★★★☆" },
            { id: 4, name: "HD Frontal - Deep Wave", price: 375, type: "Curly", rating: "★★★★★" }
        ];

        let cart = [];

        // Logic: Unified Filtering and Sorting
        function handleFilterChange() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortOrder').value;

            let filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search);
                const matchesCategory = category === 'all' || p.type.includes(category);
                return matchesSearch && matchesCategory;
            });

            // Logic: Dynamic Array Sorting
            if (sort === "low") filtered.sort((a, b) => a.price - b.price);
            if (sort === "high") filtered.sort((a, b) => b.price - a.price);

            renderUI(filtered);
        }

        function renderUI(data) {
            const grid = document.getElementById('product-grid');
            if (data.length === 0) {
                grid.innerHTML = `<div class="empty-state">No wigs found matching those criteria.</div>`;
                return;
            }

            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <div class="img-container"><div class="product-img">HD LACE</div></div>
                    <div class="product-info">
                        <div class="rating">${p.rating}</div>
                        <h3>${p.name}</h3>
                        <p class="price">$${p.price.toFixed(2)}</p>
                        <button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            cart.push(p);
            updateCart();
            toggleCart(true);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map(item => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                    <span>${item.name}</span><span>$${item.price}</span>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function toggleCart(open = false) {
            const m = document.getElementById('cart-modal');
            const o = document.getElementById('overlay');
            m.style.display = open ? 'block' : (m.style.display === 'block' ? 'none' : 'block');
            o.style.display = m.style.display;
        }

        function closeAll() {
            document.getElementById('cart-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        renderUI(products);
    </script>
</body>
</html>
