<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Shop | The Lace Website</title> 
  <style> 
    /* Premium Luxury Styling Variables */ 
    :root { 
      --primary-color: #000000; 
      --accent-color: #ab8e64; 
      --light-bg: #faf7f2; 
      --border-color: #e5dec9; 
      --text-muted: #666666;
    } 

    body { 
      font-family: 'Playfair Display', 'Helvetica Neue', Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: #ffffff; 
      color: #111111; 
      -webkit-font-smoothing: antialiased; 
    } 

    /* Premium Custom Scrollbars */ 
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #f1f1f1; } 
    ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 3px; } 

    /* Header & Navigation Layout */ 
    header { 
      background: #ffffff; 
      padding: 30px 5% 15px 5%; 
      text-align: center; 
    } 

    header h1 { 
      font-size: 38px; 
      font-weight: 400; 
      letter-spacing: 3px; 
      margin: 0 0 20px 0; 
      text-transform: uppercase; 
    } 

    nav { 
      border-top: 1px solid var(--border-color); 
      border-bottom: 1px solid var(--border-color); 
      padding: 12px 0; 
      position: relative;
    } 

    nav a { 
      color: var(--primary-color); 
      text-decoration: none; 
      margin: 0 18px; 
      text-transform: uppercase; 
      font-size: 13px; 
      letter-spacing: 1.5px; 
      transition: color 0.3s; 
    } 

    nav a.active { 
      color: var(--accent-color); 
      font-weight: bold; 
    } 

    /* Bag Toggle Button Styling */
    .cart-toggle-nav {
      position: absolute;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      font-weight: 600;
    }

    .cart-count {
      background: var(--accent-color);
      color: white;
      border-radius: 50%;
      padding: 2px 7px;
      font-size: 11px;
      margin-left: 4px;
    }

    .section-title { 
      font-size: 20px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      margin-bottom: 25px; 
      text-align: center; 
      font-weight: 400; 
    } 

    /* Featured Slider Setup */ 
    .carousel-container { padding: 40px 5% 20px 5%; max-width: 1400px; margin: 0 auto; } 
    .carousel-wrapper { position: relative; display: flex; align-items: center; } 
    .carousel-track-container { overflow: hidden; width: 100%; } 
    .carousel-track { display: flex; gap: 20px; transition: transform 0.5s ease-in-out; } 
    
    .carousel-item { 
      min-width: calc(33.333% - 14px); 
      background: #ffffff; 
      border: 1px solid var(--border-color); 
      border-radius: 4px; 
      padding: 20px; 
      text-align: center; 
      box-sizing: border-box; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
    } 

    .carousel-item img { width: 100%; height: 260px; object-fit: cover; margin-bottom: 15px; border-radius: 4px; } 
    .carousel-item h4 { font-size: 15px; margin: 10px 0 6px 0; font-weight: 600; text-transform: uppercase; } 
    .carousel-item p { color: var(--accent-color); font-weight: 700; font-size: 16px; margin: 0; } 
    
    .carousel-nav { 
      background: var(--primary-color); 
      color: #fff; 
      border: none; 
      width: 42px; 
      height: 42px; 
      border-radius: 50%; 
      cursor: pointer; 
      position: absolute; 
      z-index: 10; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 14px; 
    } 

    .prev-btn { left: -20px; } 
    .next-btn { right: -20px; } 
    .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 20px; } 
    .dot { width: 8px; height: 8px; background: #ccc; border-radius: 50%; cursor: pointer; } 
    .dot.active { background: var(--accent-color); } 

    /* Workspace Lower Grid System Split */ 
    .main-layout { 
      display: grid; 
      grid-template-columns: 300px 1fr; 
      gap: 40px; 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 30px 5% 60px 5%; 
    } 

    .column-heading { 
      font-size: 18px; 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      margin-bottom: 20px; 
      font-weight: 600; 
      text-align: center; 
    } 

    /* Filter Controls Structure */
    .filter-wrapper {
      margin-bottom: 30px;
      background: var(--light-bg);
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }

    .filter-group-title {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .filter-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 10px 5px;
      font-size: 14px;
      cursor: pointer;
      text-transform: capitalize;
      transition: color 0.2s;
    }

    .filter-btn:hover { color: var(--accent-color); }
    .filter-btn.active { color: var(--accent-color); font-weight: bold; }

    .sort-select-dropdown {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      background: white;
      font-size: 13px;
      outline: none;
    }

    /* Catalog Storefront Product Grid Elements */ 
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; } 
    
    .product-card { 
      background: #ffffff; 
      border: 1px solid var(--border-color); 
      border-radius: 4px; 
      padding: 15px; 
      text-align: center; 
      box-sizing: border-box; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      transition: box-shadow 0.3s;
    } 

    .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .product-img-wrapper img { width: 100%; height: 240px; object-fit: cover; margin-bottom: 12px; border-radius: 2px; } 
    .product-title { font-size: 13px; margin: 8px 0; color: var(--primary-color); text-transform: uppercase; font-weight: 600; line-height: 1.4; } 
    .product-price { color: var(--accent-color); font-weight: 700; margin-bottom: 12px; font-size: 14px; } 
    
    .add-to-cart-btn { 
      width: 100%; 
      background: var(--primary-color); 
      color: white; 
      border: none; 
      padding: 11px 0; 
      text-transform: uppercase; 
      font-size: 11px; 
      letter-spacing: 1px; 
      cursor: pointer; 
      font-weight: 600; 
      transition: background 0.3s; 
    } 
    .add-to-cart-btn:hover { background: var(--accent-color); } 

    /* Interactive Cart Sliding Drawer UI */
    .cart-drawer-container {
      position: fixed;
      top: 0;
      right: -360px;
      width: 350px;
      height: 100%;
      background: #ffffff;
      box-shadow: -5px 0 25px rgba(0,0,0,0.1);
      z-index: 2000;
      transition: right 0.4s ease;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .cart-drawer-container.open { right: 0; }

    .cart-header-wrapper {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header-wrapper h3 { margin: 0; text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
    .close-drawer-btn { background: none; border: none; font-size: 20px; cursor: pointer; }
    .cart-items-feed { flex: 1; overflow-y: auto; padding: 20px; }

    .cart-item {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      border-bottom: 1px solid #f5f5f5;
      padding-bottom: 15px;
    }

    .cart-item-img { width: 70px; height: 80px; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-remove { background: none; border: none; color: red; cursor: pointer; font-size: 12px; padding: 5px 0 0 0; }
    .cart-footer-summary { padding: 20px; border-top: 1px solid var(--border-color); background: var(--light-bg); }
    .subtotal-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; }

    .cart-overlay-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 1500;
      display: none;
    }

    .cart-overlay-backdrop.open { display: block; }
    .empty-message { text-align: center; color: var(--text-muted); margin-top: 40px; font-style: italic; }

    /* Responsive Viewport Rules */ 
    @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } .carousel-item { min-width: calc(50% - 10px); } } 
    @media (max-width: 600px) { .carousel-item { min-width: 100%; } } 
  </style> 
</head> 
<body> 

  <!-- Navigation Header Block --> 
  <header> 
    <h1>The Lace Website</h1> 
    <nav> 
      <a href="index.html">Home</a> 
      <a href="shop.html" class="active">Shop</a> 
      <a href="#">About</a> 
      <a href="#">Contact</a> 
      <button class="cart-toggle-nav" id="cart-toggle-btn">Bag <span class="cart-count">0</span></button>
    </nav> 
  </header> 

  <!-- Featured Slider Module --> 
  <section class="carousel-container"> 
    <h2 class="section-title">Featured Luxury Wigs</h2> 
    <div class="carousel-wrapper"> 
      <button class="carousel-nav prev-btn" id="carousel-prev">❮</button> 
      <div class="carousel-track-container"> 
        <div class="carousel-track" id="carousel-track"> 
          <!-- Permanently Visible Mannequins Baseline -->
          <div class="carousel-item">
            <img src="https://unsplash.com" alt="Silky Straight Wig">
            <h4>HD Lace Frontal Unit - Silky Straight</h4>
            <p>£580</p>
          </div>
