<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Premium SEO Meta Configurations -->
    <title>Shop Luxury HD Lace Wigs & Raw Virgin Hair | THE LACE WIGS</title>
    <meta name="description" content="Shop premium 13x4 HD lace frontals, straight bobs, body waves, and deep exotic curly virgin hair wigs. Secure checkout with fast shipping.">
    
    <!-- Font Awesome Icon Integration -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary-color: #111111;
            --accent-color: #ab8e64; /* Luxury Bronze Gold */
            --light-bg: #f9f9f9;
            --border-color: #e5e5e5;
            --shipping-green: #15803d; 
            --star-color: #facc15; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #ffffff; color: var(--primary-color); }

        /* Custom Premium Scrollbar */
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #f1f1f1; } 
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 3px; }

        /* Conversion Announcement Banner */
        .shipping-banner {
            background-color: var(--primary-color); color: #ffffff; text-align: center;
            padding: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .shipping-banner i { color: var(--accent-color); font-size: 13px; }

        /* Sticky Navigation Architecture */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; background: #fff; z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; color: var(--primary-color); text-decoration: none; }
        .logo span { color: var(--accent-color); }

        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a {
            text-decoration: none; color: var(--primary-color); font-size: 13px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            position: relative; padding-bottom: 5px; transition: color 0.3s ease;
        }
        .nav-links a:hover { color: var(--accent-color); }

        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .nav-icons i { font-size: 18px; cursor: pointer; color: var(--primary-color); }

        /* Catalog Layout Header */
        .shop-hero { text-align: center; padding: 50px 5%; background: var(--light-bg); border-bottom: 1px solid var(--border-color); }
        .shop-hero h1 { font-size: 28px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 700; }
        .shop-hero p { font-size: 14px; color: #666; max-width: 600px; margin: 0 auto; line-height: 1.6; }

        /* Store Elements Responsive Grid Layout */
        .shop-container { padding: 50px 5%; max-width: 1200px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        
        /* Card Structure Layout */
        .product-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); border-color: var(--accent-color); }

        /* Image Containers & Core Sizing Matrix */
        .image-wrapper { position: relative; width: 100%; height: 380px; background: #fdfdfd; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* High-Conversion Image Flip Interactivity Engine */
        .multi-img-wrapper { position: relative; }
        .multi-img-wrapper .product-img { position: absolute; top: 0; left: 0; transition: opacity 0.4s ease, transform 0.5s ease; }
        .primary-img { opacity: 1; z-index: 1; }
        .hover-img { opacity: 0; z-index: 0; }
        .product-card:hover .primary-img { opacity: 0; transform: scale(1.03); }
        .product-card:hover .hover-img { opacity: 1; z-index: 1; transform: scale(1.03); }

        /* Card Elements Hover Scales (Single Images) */
        .product-card:not(:has(.multi-img-wrapper)):hover .product-img { transform: scale(1.04); transition: transform 0.5s ease; }
        
        /* UI Badges */
        .badge { position: absolute; top: 15px; left: 15px; color: #ffffff; font-size: 10px; text-transform: uppercase; padding: 5px 12px; font-weight: 700; letter-spacing: 1px; border-radius: 2px; z-index: 2; }
        .sale-badge { background: #b41c1c; }
        .shipping-badge { background: var(--shipping-green); }
        .new-badge { background: var(--primary-color); }
        .stock-alert { position: absolute; bottom: 15px; right: 15px; background: rgba(255, 255, 255, 0.95); color: #b41c1c; font-size: 11px; font-weight: 700; padding: 4px 8px; border: 1px solid #b41c1c; z-index: 2; }

        /* Card Text and Variation Formatting Modules */
        .product-info { padding: 25px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .product-info h3 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary-color); margin-bottom: 6px; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        .product-specs { font-size: 12px; color: #777; margin-bottom: 12px; line-height: 1.4; }
        
        /* Dropdowns Layout */
        .variant-selectors { display: flex; gap: 10px; margin: 5px 0 15px 0; }
        .variant-select { flex: 1; padding: 10px; font-size: 12px; font-weight: 600; border: 1px solid var(--border-color); border-radius: 3px; background: #ffffff; color: var(--primary-color); cursor: pointer; outline: none; }
        .variant-select:focus { border-color: var(--accent-color); }

        /* Social Proof Stars */
        .rating { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 12px; }
        .stars { color: var(--star-color); font-size: 11px; }
        .review-count { font-size: 12px; color: #666; font-weight: 500; }

        /* Pricing Format Containers */
        .price-box { margin-bottom: 20px; }
        .price { font-size: 20px; font-weight: 700; color: var(--primary-color); }
        .old-price { font-size: 14px; font-weight: 400; color: #999; text-decoration: line-through; margin-left: 6px; }

        /* Transaction CTA Button */
        .buy-btn { display: block; width: 100%; padding: 15px 0; background: var(--primary-color); color: #ffffff; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; border-radius: 3px; transition: background 0.2s ease; border: none; cursor: pointer; }
        .buy-btn:hover { background: var(--accent-color); }
        
        .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        /* Trust Badges Container */
        .trust-badges-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 5%; max-width: 1200px; margin: 40px auto 0 auto; background: var(--light-bg); border-radius: 4px; text-align: center; }
        .badge-card i { font-size: 24px; color: var(--accent-color); margin-bottom: 12px; }
        .badge-card h4 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .badge-card p { font-size: 12px; color: #666; line-height: 1.5; }

        /* Responsive Configuration Breakpoints */
        @media (max-width: 992px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .trust-badges-container { grid-template-columns: repeat(2, 1fr); }
            .image-wrapper { height: 320px; }
        }
        @media (max-width: 640px) {
            .product-grid { grid-template-columns: 1fr; gap: 25px; }
            .trust-badges-container { grid-template-columns: 1fr; gap: 30px; }
            .shop-hero h1 { font-size: 22px; }
            .image-wrapper { height: 360px; }
        }
    </style>
</head>
