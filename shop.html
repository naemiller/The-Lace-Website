<script type="module">
  // 1. Import the official Firebase v10 functions directly from the web CDN
  import { initializeApp } from "https://gstatic.com";
  import { getFirestore, collection, getDocs } from "https://gstatic.com";

  // 2. Your Firebase configuration variables
  const firebaseConfig = { 
    apiKey: "AIzaSyCkzgI6bFXO8ukneBoImXSJyMNxRNIEhDI", 
    authDomain: "://firebaseapp.com",
    projectId: "thelacewigs-f46a5", 
    storageBucket: "thelacewigs-f46a5.firebasestorage.app", 
    messagingSenderId: "1004049108512", 
    appId: "1:1004049108512:web:4ec7cdf3e2cf683f183645", 
    measurementId: "G-DXKGF27ZQW" 
  };
  
  // 3. Initialize Firebase using the modern v10 syntax
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 4. Run your shop logic as soon as the page is ready
  document.addEventListener("DOMContentLoaded", () => {
    const shopGrid = document.getElementById("shopGrid");
    const paginationBox = document.getElementById("paginationBox");
    const pageNumbersSpan = document.getElementById("pageNumbers");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");

    let allProducts = [];
    let currentPage = 1;
    const itemsPerPage = 12;

    // 5. Fetch items using modern v10 modular structure
    getDocs(collection(db, "products")).then((querySnapshot) => {
      allProducts = [];
      querySnapshot.forEach((doc) => {
        let data = doc.data();
        data.id = doc.id;
        allProducts.push(data);
      });

      if (allProducts.length === 0) {
        shopGrid.innerHTML = '<div class="loading-text">No products found. Make sure your collection is named "products" in lowercase.</div>';
        return;
      }

      // Hide the initial loading text
      const loadingPlaceholder = shopGrid.querySelector(".loading-text");
      if (loadingPlaceholder) loadingPlaceholder.remove();

      renderPaginationControls();
      showPage(1);
    }).catch(error => {
      console.error("Database connection failure: ", error);
      shopGrid.innerHTML = '<div class="loading-text" style="color:red;">Error loading items from the cloud database.</div>';
    });

    function renderPaginationControls() {
      const totalPages = Math.ceil(allProducts.length / itemsPerPage);
      pageNumbersSpan.innerHTML = "";
      
      if (totalPages <= 1) {
        paginationBox.style.display = "none";
        return;
      }
      paginationBox.style.display = "flex";

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.className = `page-number ${i === 1 ? 'active' : ''}`;
        btn.textContent = i;
        btn.setAttribute("data-target", i);
        btn.addEventListener("click", () => showPage(i));
        pageNumbersSpan.appendChild(btn);
      }
    }

    function showPage(page) {
      currentPage = page;
      shopGrid.innerHTML = "";

      const startIndex = (page - 1) * itemsPerPage;
      const endIndex = startIndex + itemsPerPage;
      const pageItems = allProducts.slice(startIndex, endIndex);

      pageItems.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <div class="product-image-wrapper">
            <img src="${product.imageUrl || 'placeholder.jpg'}" alt="${product.name}">
          </div>
          <h4>${product.name}</h4>
          <p class="price">$${product.price}</p>
          <button class="add-to-bag" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}">Add to Bag</button>
        `;
        shopGrid.appendChild(card);
      });

      document.querySelectorAll(".page-number").forEach(btn => {
        if (parseInt(btn.getAttribute("data-target")) === page) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });

      const totalPages = Math.ceil(allProducts.length / itemsPerPage);
      prevBtn.disabled = (currentPage === 1);
      nextBtn.disabled = (currentPage === totalPages);
    }

    prevBtn.addEventListener("click", () => { if (currentPage > 1) showPage(currentPage - 1); });
    nextBtn.addEventListener("click", () => { if (currentPage < Math.ceil(allProducts.length / itemsPerPage)) showPage(currentPage + 1); });

    // --- CART SYNCHRONIZATION ---
    let cart = JSON.parse(localStorage.getItem("lace_wigs_cart")) || [];

    function updateBagIndicator() {
      const badge = document.getElementById("bag-count");
      if (badge) {
        badge.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
      }
    }

    shopGrid.addEventListener("click", (e) => {
      if (e.target.classList.contains("add-to-bag")) {
        const btn = e.target;
        const id = btn.getAttribute("data-id");
        const name = btn.getAttribute("data-name");
        const price = parseFloat(btn.getAttribute("data-price"));
        
        const existingItem = cart.find(item => item.id === id);
        if (existingItem) { existingItem.quantity += 1; } 
        else { cart.push({ id, name, price, quantity: 1 }); }

        localStorage.setItem("lace_wigs_cart", JSON.stringify(cart));
        updateBagIndicator();
        
        const originalText = btn.textContent;
        btn.textContent = "Added ✓";
        btn.style.backgroundColor = "#27ae60";
        setTimeout(() => { btn.textContent = originalText; btn.style.backgroundColor = "#000000"; }, 1000);
      }
    });

    updateBagIndicator();
  });
</script>
