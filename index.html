<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lace Wigs | Premium Luxury Hair Units</title>
  
  <style>
    /* ==========================================================================
       1. CORE RESET & VARIABLES
       ========================================================================== */
    :root {
      --primary-color: #111111;
      --secondary-color: #555555;
      --light-gray: #f9f9f9;
      --border-color: #eeeeee;
      --accent-color: #000000;
      --white: #ffffff;
      --font-stack: 'Helvetica Neue', Arial, sans-serif;
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-stack);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--white);
      color: var(--primary-color);
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ==========================================================================
       2. NAVIGATION HEADER BAR
       ========================================================================== */
    header {
      background-color: var(--white);
      border-bottom: 1px solid var(--border-color);
      padding: 25px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo h1 {
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 35px;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--secondary-color);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: var(--transition);
      position: relative;
      padding: 5px 0;
    }

    nav ul li a:hover, 
    nav ul li a.active {
      color: var(--primary-color);
    }

    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--primary-color);
      transition: var(--transition);
    }

    nav ul li a:hover::after,
    nav ul li a.active::after {
      width: 100%;
    }

    /* Shopping Bag Notification Total Badge Tracking Node Bubble */
    #bag-count {
      background-color: var(--accent-color);
      color: var(--white);
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 50%;
      margin-left: 4px;
      display: inline-block;
      vertical-align: middle;
      font-weight: bold;
    }

    /* ==========================================================================
       3. HERO BANNER CONFIGURATION
       ========================================================================== */
    .hero-banner {
      width: 100%;
      height: 75vh;
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('hero-bg.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--white);
      text-align: center;
      padding: 0 20px;
    }

    .hero-content {
      max-width: 800px;
      animation: fadeIn 1s ease-out;
    }

    .hero-banner h2 {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero-banner p {
      font-size: 1.15rem;
      letter-spacing: 1px;
      margin-bottom: 35px;
      font-weight: 300;
    }

    .cta-button {
      display: inline-block;
      background-color: var(--white);
      color: var(--accent-color);
      text-decoration: none;
      padding: 16px 45px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      transition: var(--transition);
      border: 1px solid var(--white);
      cursor: pointer;
    }

    .cta-button:hover {
      background-color: transparent;
      color: var(--white);
    }

    /* ==========================================================================
       4. EXPLORE BY TEXTURE GRID SHOWROOM
       ========================================================================== */
    .texture-section {
      padding: 100px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 60px;
      font-weight: 600;
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background-color: var(--primary-color);
      margin: 15px auto 0;
    }

    .texture-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
    }

    .texture-card {
      position: relative;
      height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
      text-decoration: none;
      color: var(--white);
    }

    .texture-card-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 1;
    }

    .texture-card:hover .texture-card-bg {
      transform: scale(1.06);
    }

    .texture-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0) 100%);
      z-index: 2;
      transition: opacity 0.3s ease;
    }

    .texture-card h4 {
      font-size: 1.6rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      position: relative;
      z-index: 3;
    }

    .texture-card .view-action {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 3;
      opacity: 0.85;
      transition: var(--transition);
    }

    .texture-card:hover .view-action {
      opacity: 1;
      transform: translateX(5px);
    }

    /* ==========================================================================
       5. BRAND VALUE PERKS TEMPLATE BANNER
       ========================================================================== */
    .perks-section {
      background-color: var(--light-gray);
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      padding: 80px 40px;
    }

    .perks-grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 50px;
    }

    .perk-item {
      text-align: center;
      padding: 10px;
    }

    .perk-item h4 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
    }

    .perk-item p {
      font-size: 0.95rem;
      color: var(--secondary-color);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ==========================================================================
       6. INTERACTIVE INTERFACE MODALS (SIZE GUIDE)
       ========================================================================== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-wrapper {
      background-color: var(--white);
      padding: 40px;
      max-width: 600px;
      width: 90%;
      position: relative;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-wrapper {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 25px;
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
    }

    .modal-wrapper h3 {
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      font-size: 1.4rem;
    }

    .size-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .size-table th, .size-table td {
      border: 1px solid var(--border-color);
      padding: 12px;
      text-align: left;
      font-size: 0.9rem;
    }

    .size-table th {
      background-color: var(--light-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ==========================================================================
       7. COMPREHENSIVE FOOTER DESIGN SYSTEM
       ========================================================================== */
    footer {
      background-color: var(--white);
      padding: 100px 40px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr repeat(2, 1fr);
      gap: 80px;
      margin-bottom: 80px;
    }

    .footer-brand h3 {
