<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lace Wigs | Professional HD Lace Shop</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for premium icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- Premium Navigation Bar -->
    <header class="navbar">
        <div class="logo">THE LACE WIGS</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="story.html">Our Story</a>
        </nav>
        <div class="nav-icons">
            <button id="cart-toggle-btn" class="cart-btn">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-count">0</span>
            </button>
        </div>
    </header>

    <!-- Luxury Featured Carousel Section -->
    <section class="carousel-container">
        <h2 class="section-title">Trending Styles</h2>
        <div class="carousel-wrapper">
            <button class="carousel-nav prev-btn" id="carousel-prev">&lt;</button>
            <div class="carousel-track-container">
                <div class="carousel-track" id="carousel-track">
                    <!-- Carousel items are dynamically loaded via JavaScript -->
                </div>
            </div>
            <button class="carousel-nav next-btn" id="carousel-next">&gt;</button>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
    </section>

    <!-- Main E-Commerce Content Area -->
    <main class="shop-container">
        
        <!-- Filter, Sorting & Admin Product Form Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-block">
                <h3>Filter Textures</h3>
                <ul class="filter-list">
                    <li><button class="filter-btn active" data-category="all">All Textures</button></li>
                    <li><button class="filter-btn" data-category="straight">Straight</button></li>
                    <li><button class="filter-btn" data-category="bodywave">Body Wave</button></li>
                    <li><button class="filter-btn" data-category="curly">Curly</button></li>
                </ul>
            </div>

            <div class="sidebar-block">
                <h3>Sort By</h3>
                <select id="sort-select" class="sort-dropdown">
                    <option value="featured">Featured</option>
                    <option value="low-high">Price: Low to High</option>
                    <option value="high-low">Price: High to Low</option>
                </select>
            </div>

            <!-- Admin Panel: Add Products For Sale -->
            <div class="sidebar-block admin-panel">
                <h3><i class="fa-solid fa-plus-minus"></i> Add New Product</h3>
                <form id="add-product-form">
                    <div class="form-group">
                        <label for="new-title">Product Title</label>
                        <input type="text" id="new-title" placeholder="e.g., Brazilian Water Wave" required>
                    </div>
                    <div class="form-group">
                        <label for="new-price">Price ($)</label>
                        <input type="number" id="new-price" step="0.01" placeholder="350.00" required>
                    </div>
                    <div class="form-group">
                        <label for="new-texture">Texture Look</label>
                        <select id="new-texture" required>
                            <option value="straight">Straight</option>
                            <option value="bodywave">Body Wave</option>
                            <option value="curly">Curly</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="new-image">Image URL Link</label>
                        <input type="url" id="new-image" placeholder="https://example.com">
                        <small>Leave blank for automatic fallback display</small>
                    </div>
                    <button type="submit" class="submit-product-btn">Publish to Shop</button>
                </form>
            </div>
        </aside>

        <!-- Dynamic Product Catalog Grid -->
        <section class="products-grid-section">
            <h2 class="section-title">All Collections</h2>
            <div class="products-grid" id="products-container"></div>
        </section>
    </main>

    <!-- Slide-Out Shopping Bag Drawer -->
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button id="cart-close-btn" class="close-btn">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <p class="empty-message">Your bag is currently empty.</p>
        </div>
        <div class="cart-footer">
            <div class="subtotal-row">
                <span>Subtotal:</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    <div class="cart-overlay" id="cart-overlay"></div>

    <script src="script.js"></script>
</body>
</html>
