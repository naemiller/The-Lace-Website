<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lace Wigs | Premium Luxury Hair Units</title>
  
  <style>
    /* ==========================================================================
       1. BRAND IDENTITY VARIABLES & ROOT CONFIGURATION
       ========================================================================== */
    :root {
      /* Brand Color Palette */
      --color-primary: #111111;
      --color-secondary: #555555;
      --color-muted: #777777;
      --color-light-gray: #eeeeee;
      --color-bg-light: #fcfcfc;
      --color-bg-pure: #ffffff;
      --color-accent-badge: #000000;
      --color-overlay-dark: rgba(0, 0, 0, 0.45);
      --color-overlay-gradient: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.2) 60%, transparent 100%);
      
      /* Typography System */
      --font-primary: 'Helvetica Neue', Arial, sans-serif;
      --tracking-wide: 3px;
      --tracking-medium: 1.5px;
      --tracking-tight: 0.5px;
      
      /* Structural Properties */
      --header-height: 85px;
      --max-width-container: 1280px;
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --border-radius-badge: 20px;
    }

    /* ==========================================================================
       2. GLOBAL RESET & BASE LAYOUT SYSTEM
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      background-color: var(--color-bg-pure);
      color: var(--color-primary);
      scroll-behavior: smooth;
      overflow-x: hidden;
      width: 100%;
    }

    /* Utility Layout Components */
    .container {
      width: 100%;
      max-width: var(--max-width-container);
      margin: 0 auto;
      padding: 0 40px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
      transition: var(--transition-smooth);
    }

    /* ==========================================================================
       3. NAVIGATION & HEADER DESIGN LAYOUT
       ========================================================================== */
    header {
      background-color: var(--color-bg-pure);
      border-bottom: 1px solid var(--color-light-gray);
      height: var(--header-height);
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      align-items: center;
      transition: var(--transition-smooth);
    }

    .header-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo h1 {
      font-size: 1.45rem;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      font-weight: 700;
      user-select: none;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 32px;
      align-items: center;
    }

    nav ul li a {
      color: var(--color-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: var(--tracking-tight);
      text-transform: uppercase;
      position: relative;
      padding: 6px 0;
    }

    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background-color: var(--color-primary);
      transition: var(--transition-smooth);
    }

    nav ul li a:hover::after, 
    nav ul li a.active::after {
      width: 100%;
    }

    nav ul li a:hover, 
    nav ul li a.active {
      color: var(--color-primary);
    }

    /* Shopping Bag Total Badge Tracking Bubble */
    .bag-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    #bag-count {
      background-color: var(--color-accent-badge);
      color: var(--color-bg-pure);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: var(--border-radius-badge);
      display: inline-block;
      transition: var(--transition-smooth);
    }

    .bag-link:hover #bag-count {
      transform: scale(1.1);
    }

    /* ==========================================================================
       4. HERO BANNER CONFIGURATION
       ========================================================================== */
    .hero-banner {
      width: 100%;
      height: calc(85vh - var(--header-height));
      min-height: 500px;
      background: linear-gradient(var(--color-overlay-dark), var(--color-overlay-dark)), 
                  url('hero-bg.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: var(--color-bg-pure);
      text-align: center;
      padding: 0 20px;
      position: relative;
    }

    .hero-banner h2 {
      font-size: 3.2rem;
      font-weight: 300;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 24px;
      line-height: 1.2;
      animation: fadeInDown 1s ease;
    }

    .hero-banner p {
      font-size: 1.15rem;
      letter-spacing: var(--tracking-tight);
      margin-bottom: 36px;
      max-width: 680px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
      animation: fadeInUp 1s ease 0.2s backwards;
    }

    .cta-button {
      background-color: var(--color-bg-pure);
      color: var(--color-primary);
      padding: 16px 44px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      font-weight: 600;
      border: 1px solid var(--color-bg-pure);
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      animation: fadeInUp 1s ease 0.4s backwards;
    }

    .cta-button:hover {
      background-color: transparent;
      color: var(--color-bg-pure);
      transform: translateY(-2px);
    }

    /* ==========================================================================
       5. INTERACTIVE TEXTURE SHOWCASE GRID
       ========================================================================== */
    .texture-section {
      padding: 100px 0;
      background-color: var(--color-bg-pure);
    }

    .section-header {
      text-align: center;
      margin-bottom: 60px;
    }

    .section-header h3 {
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      font-weight: 400;
      position: relative;
      display: inline-block;
      padding-bottom: 15px;
    }

    .section-header h3::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background-color: var(--color-primary);
    }

    .texture-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 35px;
    }

    .texture-card {
      position: relative;
      height: 500px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
      color: var(--color-bg-pure);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .texture-card .card-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .texture-card:hover .card-bg {
      transform: scale(1.06);
    }

    .texture-card .bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-overlay-gradient);
      z-index: 2;
    }

    .texture-card-content {
      position: relative;
      z-index: 3;
      transform: translateY(15px);
      transition: var(--transition-smooth);
    }

    .texture-card:hover .texture-card-content {
      transform: translateY(0);
    }

    .texture-card h4 {
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-medium);
      margin-bottom: 10px;
      font-weight: 500;
    }

    .texture-card .view-action {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-tight);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.8;
      transition: var(--transition-smooth);
    }

    .texture-card:hover .view-action {
      opacity: 1;
      gap: 14px;
    }

    /* ==========================================================================
       6. VALUE PROPOSITION PERKS BANNER
       ========================================================================== */
    .perks-section {
      background-color: var(--color-bg-light);
      border-top: 1px solid var(--color-light-gray);
      border-bottom: 1px solid var(--color-light-gray);
      padding: 70px 0;
    }

    .perks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 50px;
    }

    .perk-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 10px;
    }

    .perk-icon-wrapper {
      font-size: 1.8rem;
      margin-bottom: 18px;
      color: var(--color-primary);
    }

    .perk-item h4 {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: var(--tracking-medium);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .perk-item p {
      font-size: 0.9rem;
      color: var(--color-secondary);
      line-height: 1.5;
    }

    /* ==========================================================================
       7. ENTERPRISE FOOTER LAYOUT STRUCTURE
