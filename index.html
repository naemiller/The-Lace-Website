<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | The Lace Wigs</title>
  
  <style>
    /* Reset & Base Typography Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background-color: #fafafa;
      color: #111111;
    }

    /* Navigation Bar Design */
    header {
      background-color: #ffffff;
      border-bottom: 1px solid #eeeeee;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo h1 {
      font-size: 1.5rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
    }

    nav ul li a {
      text-decoration: none;
      color: #555555;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    nav ul li a:hover, nav ul li a.active {
      color: #000000;
    }

    /* Shopping Bag Badge */
    #bag-count {
      background-color: #000000;
      color: #ffffff;
      font-size: 0.75rem;
      padding: 2px 7px;
      border-radius: 50%;
      margin-left: 4px;
      display: inline-block;
      vertical-align: middle;
    }

    /* Hero Section Styling */
    .hero {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    .hero p {
      font-size: 1.2rem;
      color: #666666;
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .cta-btn {
      display: inline-block;
      background-color: #000000;
      color: #ffffff;
      text-decoration: none;
      padding: 15px 40px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      border-radius: 4px;
      letter-spacing: 1px;
      transition: background-color 0.2s ease;
    }

    .cta-btn:hover {
      background-color: #ab8e64; /* Accent color matching your admin screen */
    }

    /* Screen Breakpoints for Responsive Mobile Execution */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }
      .hero h2 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

  <!-- Site Nav Header Area -->
  <header>
    <div class="logo">
      <h1>The Lace Wigs</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="login.html">Account</a></li>
        <li><a href="bag.html">Bag <span id="bag-count">0</span></a></li>
      </ul>
    </nav>
  </header>

  <!-- Welcome / Brand Landing Space -->
  <main class="hero">
    <h2>Premium Quality HD Lace Units</h2>
    <p>Experience the ultimate luxury hair solution. Our meticulously crafted units feature completely undetectable melted hairlines paired with 100% premium virgin hair density.</p>
    <a href="shop.html" class="cta-btn">Explore The Collection</a>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Keep track of total items currently sitting inside local cart storage
      function updateHeaderBadge() {
        const cart = JSON.parse(localStorage.getItem("lace_wigs_cart")) || [];
        const badge = document.getElementById("bag-count");
        if (badge) {
          const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
          badge.textContent = totalItems;
        }
      }

      // Execute badge count load on startup
      updateHeaderBadge();
    });
  </script>

</body>
</html>
